<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md relative overflow-x-hidden selection:bg-primary-container selection:text-white">
<!-- Hero Background Wrapper -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A massive, high-contrast collage of iconic cinematic movie stills spanning action, drama, and sci-fi genres. The images are slightly desaturated and heavily shadowed to create a dark, brooding atmosphere. A profound black gradient rises from the bottom edge, engulfing the lower half of the frame to ensure absolute void for text overlays. The overarching aesthetic is premium, dark-mode theater, utilizing deep #000000 blacks and subtle film-grain textures to evoke excitement and exclusivity without overwhelming the foreground UI." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB_fTHm_O-lU-AS8Mab5PUdQHvwLKE6ku0aRcJpxVEBwQD0S9Nf9oTpRYi-jsPB3CDUrCBtRTLPA2HUFfzX2Xn5RATkddW81fCAV4v4pYMHG_rwqB863UDoEBnWw6L7s-3jl0HNonrgz0k30MhvFnoYyExzcGvB-SZ0O-3jiPt9vLq8XGKtfao6yjTSCmh64V_7f_Hy8ggyDEob6jBDn_0CFAzVf3C2t1WQZh6RTFJWWg9nzHun0EacubuoTibRW3XUVxSFKbZp58g');"></div>
<!-- Gradient Overlay for Legibility & Vibe -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/80 to-background/30"></div>
<div class="absolute inset-0 bg-black/40"></div>
</div>
<!-- Main Content Canvas (Transactional Page - Nav Suppressed) -->
<main class="flex-grow flex items-center justify-center relative z-10 px-margin-mobile md:px-margin-desktop py-row-gap">
<!-- Glassmorphic Registration Card -->
<div class="w-full max-w-md bg-glass rounded-xl p-8 md:p-10 shadow-2xl relative overflow-hidden">
<!-- Subtle Glow Accent -->
<div class="absolute -top-[100px] -right-[100px] w-64 h-64 bg-primary-container/20 rounded-full blur-[80px] pointer-events-none"></div>
<div class="mb-8 text-center">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary-container tracking-tighter mb-2">CINEMAFLIX</h1>
<p class="font-body-md text-body-md text-secondary">Join the ultimate cinematic experience.</p>
</div>
<form class="space-y-6">
<!-- Full Name Field -->
<div>
<label class="sr-only" for="fullName">Full Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest/80 text-on-surface font-body-md text-body-md rounded-lg px-4 py-3 pb-3 pt-4 border-b-2 border-transparent focus:border-primary-container focus:bg-surface-container focus:outline-none transition-colors placeholder:text-secondary peer" id="fullName" name="fullName" placeholder="Full Name" required="" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary peer-focus:text-primary-container transition-colors material-symbols-outlined" data-icon="person">person</span>
</div>
</div>
<!-- Email Field -->
<div>
<label class="sr-only" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest/80 text-on-surface font-body-md text-body-md rounded-lg px-4 py-3 pb-3 pt-4 border-b-2 border-transparent focus:border-primary-container focus:bg-surface-container focus:outline-none transition-colors placeholder:text-secondary peer" id="email" name="email" placeholder="Email Address" required="" type="email"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary peer-focus:text-primary-container transition-colors material-symbols-outlined" data-icon="mail">mail</span>
</div>
</div>
<!-- Password Field -->
<div>
<label class="sr-only" for="password">Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest/80 text-on-surface font-body-md text-body-md rounded-lg px-4 py-3 pb-3 pt-4 border-b-2 border-transparent focus:border-primary-container focus:bg-surface-container focus:outline-none transition-colors placeholder:text-secondary peer" id="password" name="password" placeholder="Password" required="" type="password"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary peer-focus:text-primary-container transition-colors material-symbols-outlined" data-icon="lock">lock</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container text-white font-title-md text-title-md py-4 rounded-lg hover:bg-inverse-primary transition-colors duration-200 mt-2 shadow-[0_0_15px_rgba(229,9,20,0.4)] hover:shadow-[0_0_25px_rgba(229,9,20,0.6)]" type="submit">
                    Sign Up
                </button>
</form>
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-secondary">
                    Already have an account? 
                    <a class="text-on-surface hover:text-primary-container transition-colors font-title-md text-title-md border-b border-transparent hover:border-primary-container pb-0.5" href="#">Log in</a>
</p>
