<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md relative overflow-x-hidden">
<!-- Cinematic Background Image -->
<div class="fixed inset-0 z-[-1] bg-cover bg-center" data-alt="A dramatic cinematic scene featuring a dimly lit movie theater aisle with plush red velvet seats stretching into the darkness. The lighting is moody and atmospheric, mimicking the intense glow of a silver screen illuminating the deep blacks and rich reds of the environment. The overall aesthetic perfectly captures the premium, high-contrast, lights-out experience of a modern high-end cinema, setting a thrilling mood." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBve6Qu3hwaViAApNbbATGCkorfuEGMVaYPoXpKt2mCL4X9L83QeB3ayO80kmaurt8p1fe6tgiFqGTk6LuESi0qVP5qwixYJ78Nyp06ICXToS2jkFRB2mUxf5-8VbB1klQkVXo4m14vZQR_GXNWUaGZbtMv6QDa4amRiZJNDt1hYMWSiFkJA3fQvMS4UEofRw6EP0aWihs5__gUhdz0OPM8th6TEWUqQj8e9DSsyr9ljzV_DXezXyaCkhcZigf8gY8Mg5sP8QaxklI');">
<!-- Gradient Overlay to ensure text readability -->
<div class="absolute inset-0 bg-background/60 bg-gradient-to-t from-background via-background/80 to-background/40"></div>
</div>
<!-- Minimal Header for Transactional Page -->
<header class="w-full flex justify-between items-center px-margin-mobile md:px-margin-desktop py-6 z-10">
<a class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary-container tracking-tighter hover:scale-105 transition-transform duration-200" href="/">
            CINEMAFLIX
        </a>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-row-gap z-10">
<!-- Login Card (Glassmorphism) -->
<div class="w-full max-w-[450px] bg-surface/80 backdrop-blur-[20px] border border-white/15 rounded-xl p-8 md:p-12 shadow-2xl flex flex-col gap-6">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">
                Sign In
            </h1>
<form action="#" class="flex flex-col gap-6" method="POST">
<!-- Email Input -->
<div class="relative group">
<input class="w-full bg-surface-container border-0 border-b-2 border-surface-variant text-on-surface font-body-md text-body-md px-4 py-4 rounded-t-DEFAULT focus:ring-0 focus:border-primary-container focus:bg-surface-bright transition-colors peer placeholder-transparent" id="email" name="email" placeholder="Email or phone number" required="" type="email"/>
<label class="absolute left-4 top-4 text-secondary font-body-md text-body-md transition-all peer-focus:-translate-y-3 peer-focus:scale-75 peer-focus:text-secondary peer-valid:-translate-y-3 peer-valid:scale-75 origin-left cursor-text" for="email">
                        Email or phone number
                    </label>
</div>
<!-- Password Input -->
<div class="relative group">
<input class="w-full bg-surface-container border-0 border-b-2 border-surface-variant text-on-surface font-body-md text-body-md px-4 py-4 rounded-t-DEFAULT focus:ring-0 focus:border-primary-container focus:bg-surface-bright transition-colors peer placeholder-transparent" id="password" name="password" placeholder="Password" required="" type="password"/>
<label class="absolute left-4 top-4 text-secondary font-body-md text-body-md transition-all peer-focus:-translate-y-3 peer-focus:scale-75 peer-focus:text-secondary peer-valid:-translate-y-3 peer-valid:scale-75 origin-left cursor-text" for="password">
                        Password
                    </label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary-container text-white font-title-md text-title-md py-4 rounded-DEFAULT hover:bg-inverse-primary hover:scale-[1.02] active:scale-95 transition-all duration-200 mt-2" type="submit">
                    Sign In
                </button>
<!-- Helper Links -->
<div class="flex justify-between items-center mt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="form-checkbox bg-surface border-surface-variant text-primary-container rounded-sm focus:ring-primary-container focus:ring-offset-surface" type="checkbox"/>
<span class="font-body-md text-body-md text-secondary group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body-md text-body-md text-secondary hover:text-on-surface hover:underline transition-colors" href="#">
                        Need help?
                    </a>
</div>
</form>
<!-- Sign Up Prompt -->
<div class="mt-8 text-secondary font-body-md text-body-md">
                New to CinemaFlix? 
                <a class="text-on-surface hover:text-primary-container hover:underline transition-colors font-title-md ml-1" href="/register">
                    Sign up now.
                </a>
</div>
<!-- Recaptcha Disclaimer -->
<p class="font-label-sm text-label-sm text-surface-variant mt-2 max-w-[90%]">
                This page is protected by Google reCAPTCHA to ensure you're not a bot. 
                <button class="text-primary hover:underline">Learn more.</button>
</p>
</div>
</main>
<!-- Footer for Transactional Page -->
<footer class="w-full bg-background/90 backdrop-blur-md border-t border-surface-variant flex flex-col md:flex-row justify-between items-center px-margin-mobile md:px-margin-desktop py-8 gap-4 mt-auto z-10">
<div class="font-headline-lg-mobile text-headline-lg-mobile text-primary-container tracking-tighter opacity-80 hover:opacity-100 transition-opacity">
            CINEMAFLIX
        </div>
<div class="flex flex-wrap justify-center gap-6">
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Help Center</a>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Cookie Preferences</a>
</div>
<div class="font-label-sm text-label-sm text-secondary">
            © 2024 CinemaFlix Inc. All rights reserved.
        </div>
</footer>
